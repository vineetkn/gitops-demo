apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: nginx-gitops
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/vineetkn/gitops-demo.git
    targetRevision: main
    path: apps/nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
